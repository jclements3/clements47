<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Josephus 3D-printed lever - exploded assembly + bridge pin</title>

  <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>

  <text x="400" y="26" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">
    Josephus 3D-printed lever - exploded assembly + bridge pin (Regular size)
  </text>
  <text x="400" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555">
    Source: harpcanada.com/3d-lever (CC BY-SA 2024). 3 printed parts + 1 spring pin per lever; bridge pin = #6 screw + printed sleeve.
  </text>

  <!-- ============ Top: lever exploded along the axle ============ -->
  <g transform="translate(80, 80)">
    <text x="320" y="0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">EXPLODED VIEW (along the slotted spring tension pin axis)</text>

    <!-- centerline -->
    <line x1="0" y1="120" x2="640" y2="120" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4"/>

    <!-- LEFT JAW of base -->
    <g transform="translate(40, 60)">
      <path d="M 0 30 L 30 30 L 30 90 L 0 90 Z M 30 50 L 30 70" fill="#3060a0" stroke="#102a55" stroke-width="0.8"/>
      <circle cx="22" cy="60" r="3" fill="none" stroke="#102a55" stroke-width="0.8"/>
      <text x="15" y="115" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#102a55">base (left jaw)</text>
      <text x="15" y="128" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#102a55">PLA, 4 mm thick</text>
    </g>

    <!-- ROTOR / handle -->
    <g transform="translate(140, 30)">
      <!-- handle main body, 5 mm thick -->
      <rect x="0" y="80" width="20" height="20" fill="#e07020" stroke="#7a3a10" stroke-width="0.8"/>
      <!-- handle stem -->
      <rect x="6" y="0" width="8" height="80" fill="#e07020" stroke="#7a3a10" stroke-width="0.8"/>
      <!-- V-groove cradle at the top -->
      <path d="M 0 5 L 10 -5 L 20 5 L 18 5 L 10 -2 L 2 5 Z" fill="#e07020" stroke="#7a3a10" stroke-width="0.8"/>
      <!-- axle hole through the rotor -->
      <circle cx="10" cy="90" r="2.5" fill="none" stroke="#7a3a10" stroke-width="0.8" stroke-dasharray="2 1.5"/>
      <text x="10" y="125" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#7a3a10">rotor / handle</text>
      <text x="10" y="138" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#7a3a10">PLA, L = 39 mm,</text>
      <text x="10" y="150" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#7a3a10">W = 5 mm</text>
      <!-- V-groove callout -->
      <line x1="20" y1="-5" x2="60" y2="-5" stroke="#444" stroke-width="0.4"/>
      <text x="62" y="-2" font-family="sans-serif" font-size="9" fill="#444">V-groove pusher</text>
    </g>

    <!-- SLOTTED SPRING TENSION PIN -->
    <g transform="translate(220, 105)">
      <rect x="0" y="0" width="60" height="3" fill="#c8c8c8" stroke="#444" stroke-width="0.6"/>
      <rect x="0" y="3.5" width="60" height="0.5" fill="#888"/>      <!-- the slot -->
      <rect x="0" y="-0.5" width="60" height="0.5" fill="#888"/>
      <text x="30" y="35" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#444">slotted spring tension pin</text>
      <text x="30" y="48" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#444">5/64" (1.98 mm) x 7/16"  high-C steel</text>
      <text x="30" y="60" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#444">SPAENAUR TP-58</text>
    </g>

    <!-- RIGHT JAW of base -->
    <g transform="translate(330, 60)">
      <path d="M 0 30 L 30 30 L 30 90 L 0 90 Z" fill="#3060a0" stroke="#102a55" stroke-width="0.8"/>
      <circle cx="8" cy="60" r="3" fill="none" stroke="#102a55" stroke-width="0.8"/>
      <text x="15" y="115" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#102a55">base (right jaw)</text>
      <text x="15" y="128" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#102a55">jaws are one printed</text>
      <text x="15" y="140" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#102a55">part - shown split here</text>
    </g>

    <!-- arrows showing assembly direction -->
    <path d="M 75 120 L 100 120 M 95 116 L 100 120 L 95 124" stroke="#0a6" stroke-width="1" fill="none"/>
    <path d="M 200 120 L 215 120 M 210 116 L 215 120 L 210 124" stroke="#0a6" stroke-width="1" fill="none"/>
    <path d="M 295 120 L 320 120 M 315 116 L 320 120 L 315 124" stroke="#0a6" stroke-width="1" fill="none"/>

    <!-- ASSEMBLED OVERVIEW (right side of exploded) -->
    <g transform="translate(450, 60)">
      <text x="80" y="-12" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">assembled</text>
      <!-- base body -->
      <path d="M 30 30 L 130 30 L 130 90 L 30 90 Z M 50 50 L 110 50 L 110 70 L 50 70 Z"
            fill="#3060a0" stroke="#102a55" stroke-width="0.8" fill-rule="evenodd"/>
      <!-- rotor between jaws -->
      <rect x="65" y="55" width="30" height="10" fill="#e07020" stroke="#7a3a10" stroke-width="0.6"/>
      <!-- handle stem -->
      <rect x="74" y="-15" width="12" height="70" fill="#e07020" stroke="#7a3a10" stroke-width="0.6"/>
      <!-- V tip -->
      <path d="M 70 -20 L 80 -28 L 90 -20 L 88 -20 L 80 -25 L 72 -20 Z" fill="#e07020" stroke="#7a3a10" stroke-width="0.6"/>
      <!-- spring pin running through -->
      <line x1="40" y1="60" x2="120" y2="60" stroke="#888" stroke-width="2"/>
      <text x="80" y="105" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#102a55">- mount via slot:  M3 / #4-40 cap screw</text>
      <text x="80" y="116" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#102a55">- pin press-fit gives the "click" feel</text>
    </g>
  </g>

  <!-- ============ Bottom: bridge pin (the V-groove screw) ============ -->
  <g transform="translate(80, 320)">
    <text x="320" y="0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">BRIDGE PIN: threaded screw + printed V-groove sleeve (one per string)</text>

    <line x1="0" y1="100" x2="640" y2="100" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4"/>

    <!-- screw (Philips #6, 30 mm L) -->
    <g transform="translate(60, 60)">
      <!-- head -->
      <circle cx="0" cy="40" r="8" fill="#bbbbbb" stroke="#444" stroke-width="0.6"/>
      <line x1="-5" y1="40" x2="5" y2="40" stroke="#222" stroke-width="0.8"/>
      <line x1="0" y1="35" x2="0" y2="45" stroke="#222" stroke-width="0.8"/>
      <!-- shank with thread shading -->
      <rect x="-2" y="40" width="4" height="80" fill="#aaa" stroke="#444" stroke-width="0.5"/>
      <g stroke="#444" stroke-width="0.4">
        <line x1="-2" y1="46" x2="2" y2="48"/>
        <line x1="-2" y1="50" x2="2" y2="52"/>
        <line x1="-2" y1="54" x2="2" y2="56"/>
        <line x1="-2" y1="58" x2="2" y2="60"/>
        <line x1="-2" y1="62" x2="2" y2="64"/>
        <line x1="-2" y1="66" x2="2" y2="68"/>
        <line x1="-2" y1="70" x2="2" y2="72"/>
        <line x1="-2" y1="74" x2="2" y2="76"/>
        <line x1="-2" y1="78" x2="2" y2="80"/>
        <line x1="-2" y1="82" x2="2" y2="84"/>
        <line x1="-2" y1="86" x2="2" y2="88"/>
        <line x1="-2" y1="90" x2="2" y2="92"/>
        <line x1="-2" y1="94" x2="2" y2="96"/>
        <line x1="-2" y1="98" x2="2" y2="100"/>
        <line x1="-2" y1="102" x2="2" y2="104"/>
        <line x1="-2" y1="106" x2="2" y2="108"/>
        <line x1="-2" y1="110" x2="2" y2="112"/>
        <line x1="-2" y1="114" x2="2" y2="116"/>
        <line x1="-2" y1="118" x2="2" y2="120"/>
      </g>
      <text x="0" y="138" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#444">Philips #6 x 30 mm</text>
    </g>

    <!-- arrow + sleeve -->
    <path d="M 100 100 L 220 100 M 215 96 L 220 100 L 215 104" stroke="#0a6" stroke-width="1" fill="none"/>

    <!-- 3D printed sleeve with V-groove on top, slips over the screw shank -->
    <g transform="translate(280, 60)">
      <!-- sleeve body -->
      <rect x="-10" y="38" width="20" height="14" fill="#bbb" stroke="#444" stroke-width="0.6"/>
      <!-- V-groove cut into top -->
      <path d="M -10 38 L 0 30 L 10 38" fill="#fff" stroke="#444" stroke-width="0.6"/>
      <!-- center hole -->
      <line x1="0" y1="38" x2="0" y2="120" stroke="#888" stroke-width="0.5" stroke-dasharray="2 2"/>
      <text x="0" y="138" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#444">printed sleeve  Ø7 x 6 mm</text>
      <text x="0" y="150" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#444">V-groove on top</text>

      <!-- string sitting in the V -->
      <line x1="-30" y1="34" x2="30" y2="34" stroke="#222" stroke-width="2"/>
      <text x="40" y="36" font-family="sans-serif" font-size="9" fill="#222">string in V</text>
    </g>

    <!-- arrow -->
    <path d="M 360 100 L 460 100 M 455 96 L 460 100 L 455 104" stroke="#0a6" stroke-width="1" fill="none"/>

    <!-- assembled bridge pin in the neck plate -->
    <g transform="translate(540, 30)">
      <text x="0" y="-2" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">installed</text>
      <defs>
        <pattern id="hatchB" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#a08060" stroke-width="1"/>
        </pattern>
      </defs>
      <rect x="-50" y="100" width="100" height="14" fill="url(#hatchB)" stroke="#6b4a2a" stroke-width="1"/>
      <!-- screw goes through plate -->
      <rect x="-2" y="50" width="4" height="64" fill="#aaa" stroke="#444" stroke-width="0.5"/>
      <!-- sleeve sits on plate top -->
      <rect x="-10" y="86" width="20" height="14" fill="#bbb" stroke="#444" stroke-width="0.6"/>
      <path d="M -10 86 L 0 78 L 10 86" fill="#fff" stroke="#444" stroke-width="0.6"/>
      <line x1="-30" y1="82" x2="30" y2="82" stroke="#222" stroke-width="2"/>
      <text x="0" y="135" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#444">screw threads into plate;</text>
      <text x="0" y="146" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#444">turn screw to adjust V height</text>
    </g>
  </g>

  <!-- ============ Hardware notes ============ -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="680" height="80" fill="#f8f5ee" stroke="#888" stroke-width="0.6"/>
    <text x="14" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#222">Bill of materials per lever</text>
    <text x="14" y="38" font-family="sans-serif" font-size="11" fill="#333">- 1 x base (printed PLA, 0.16 mm layers, 90% infill, K1C/Hyper PLA)  - 1 x rotor handle (printed PLA, same)  - 1 x V-groove pusher tip (integral with rotor)</text>
    <text x="14" y="54" font-family="sans-serif" font-size="11" fill="#333">- 1 x slotted spring tension pin (TP-58 high-carbon steel)  - 1 x #4-40 button cap screw, 13 mm long  - bridge pin: 1 x #6 Philips, 30 mm + 1 x printed sleeve Ø7 x 6 mm</text>
    <text x="14" y="70" font-family="sans-serif" font-size="11" fill="#333">- For 47 strings: ~47 levers + 47 bridge pins. PLA print time roughly 10 min/lever, so &lt; 10 hours total on a fast K1C printer.</text>
  </g>
</svg>
