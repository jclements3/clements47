<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Josephus 3D-printed lever - side view (down + engaged)</title>

  <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>

  <!-- header -->
  <text x="400" y="26" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">
    Josephus 3D-printed harp lever - side elevation (Regular size)
  </text>
  <text x="400" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555">
    Source: harpcanada.com/3d-lever (CC BY-SA 2024). Pusher-type single-contact lever; V-groove on the rotor lifts the string by one semitone.
  </text>

  <!-- ============== Position A: handle DOWN (string open) ============== -->
  <g transform="translate(80, 110)">
    <text x="120" y="-8" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">A. Handle DOWN (open string)</text>

    <!-- neck plate (hatched section) -->
    <defs>
      <pattern id="hatchA" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="#a08060" stroke-width="1"/>
      </pattern>
    </defs>
    <rect x="0" y="200" width="280" height="14" fill="url(#hatchA)" stroke="#6b4a2a" stroke-width="1"/>
    <text x="-6" y="211" font-family="sans-serif" font-size="9" text-anchor="end" fill="#6b4a2a">neck plate</text>

    <!-- bridge pin (threaded screw + 3D sleeve) -->
    <rect x="55" y="180" width="3" height="20" fill="#999" stroke="#444" stroke-width="0.6"/>   <!-- screw shank -->
    <rect x="50" y="170" width="13" height="12" fill="#bbb" stroke="#444" stroke-width="0.6"/>  <!-- printed sleeve -->
    <text x="56" y="158" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555">bridge pin</text>
    <text x="56" y="168" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555">+ sleeve</text>
    <!-- string passing over the bridge pin V (open position) -->
    <line x1="0" y1="170" x2="280" y2="170" stroke="#222" stroke-width="2.2"/>
    <text x="265" y="163" font-family="sans-serif" font-size="9" fill="#222">string</text>

    <!-- BASE: bonded to plate, holds the rotor between two jaws -->
    <path d="M 110 200 L 200 200 L 200 175 L 188 175 L 188 188 L 122 188 L 122 175 L 110 175 Z"
          fill="#3060a0" stroke="#102a55" stroke-width="0.8"/>
    <text x="155" y="227" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#102a55">BASE (printed PLA)</text>
    <!-- screw slot inside the base (dashed) -->
    <line x1="135" y1="207" x2="175" y2="207" stroke="#fff" stroke-width="1.6"/>
    <line x1="135" y1="207" x2="175" y2="207" stroke="#102a55" stroke-width="0.6" stroke-dasharray="2 2"/>

    <!-- ROTOR / handle, in DOWN position (V-groove faces away from string) -->
    <g transform="translate(155, 175) rotate(60)">
      <!-- rotor body: 39 mm long, 5 mm wide, with a V-groove pusher at the far end -->
      <path d="M -3 0 L 3 0 L 3 -39 L 5 -39 L 0 -45 L -5 -39 L -3 -39 Z"
            fill="#e07020" stroke="#7a3a10" stroke-width="0.8"/>
      <!-- spring tension pin (axle) at rotor pivot -->
      <circle cx="0" cy="0" r="2" fill="#888" stroke="#222" stroke-width="0.6"/>
      <text x="6" y="-12" font-family="sans-serif" font-size="9" fill="#7a3a10" transform="rotate(-60)">handle</text>
      <text x="6" y="-25" font-family="sans-serif" font-size="9" fill="#7a3a10" transform="rotate(-60)">(rotor)</text>
    </g>

    <!-- spring pin axle callout -->
    <line x1="155" y1="175" x2="232" y2="148" stroke="#666" stroke-width="0.4"/>
    <text x="234" y="146" font-family="sans-serif" font-size="9" fill="#444">slotted spring tension pin</text>
    <text x="234" y="156" font-family="sans-serif" font-size="9" fill="#444">5/64" x 7/16" carbon steel (TP-58)</text>

    <!-- baseline string height dim -->
    <line x1="6" y1="170" x2="6" y2="200" stroke="#444" stroke-width="0.4"/>
    <line x1="0" y1="170" x2="12" y2="170" stroke="#444" stroke-width="0.4"/>
    <line x1="0" y1="200" x2="12" y2="200" stroke="#444" stroke-width="0.4"/>
    <text x="14" y="188" font-family="sans-serif" font-size="9" fill="#444">12 mm</text>
    <text x="14" y="198" font-family="sans-serif" font-size="9" fill="#444">(string ht)</text>
  </g>

  <!-- ============== Position B: handle UP (string fretted +1 semitone) ============== -->
  <g transform="translate(440, 110)">
    <text x="120" y="-8" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">B. Handle UP (string raised by a semitone)</text>

    <rect x="0" y="200" width="280" height="14" fill="url(#hatchA)" stroke="#6b4a2a" stroke-width="1"/>

    <!-- bridge pin (same) -->
    <rect x="55" y="180" width="3" height="20" fill="#999" stroke="#444" stroke-width="0.6"/>
    <rect x="50" y="170" width="13" height="12" fill="#bbb" stroke="#444" stroke-width="0.6"/>

    <!-- ROTOR ROTATED so V-groove pushes the string UP by 5 mm -->
    <g transform="translate(155, 175) rotate(-15)">
      <path d="M -3 0 L 3 0 L 3 -39 L 5 -39 L 0 -45 L -5 -39 L -3 -39 Z"
            fill="#e07020" stroke="#7a3a10" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="2" fill="#888" stroke="#222" stroke-width="0.6"/>
      <!-- V-groove cradle at the pusher tip -->
      <path d="M -3 -41 L 0 -45 L 3 -41" stroke="#7a3a10" stroke-width="1.2" fill="none"/>
    </g>

    <!-- string is now lifted at the lever, then drops to the bridge pin -->
    <path d="M 0 170 L 105 170 L 155 132 L 200 170 L 280 170" stroke="#222" stroke-width="2.2" fill="none"/>
    <circle cx="155" cy="132" r="2" fill="#c00"/>
    <text x="170" y="123" font-family="sans-serif" font-size="9" fill="#c00">contact point</text>

    <!-- BASE (same) -->
    <path d="M 110 200 L 200 200 L 200 175 L 188 175 L 188 188 L 122 188 L 122 175 L 110 175 Z"
          fill="#3060a0" stroke="#102a55" stroke-width="0.8"/>

    <!-- elevation dim: string lifted 5 mm -->
    <line x1="270" y1="170" x2="270" y2="132" stroke="#0a6" stroke-width="0.6"/>
    <line x1="265" y1="170" x2="275" y2="170" stroke="#0a6" stroke-width="0.6"/>
    <line x1="265" y1="132" x2="275" y2="132" stroke="#0a6" stroke-width="0.6"/>
    <text x="275" y="155" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0a6">5 mm lift</text>
    <text x="275" y="167" font-family="sans-serif" font-size="9" fill="#0a6">(= 1 semitone</text>
    <text x="275" y="178" font-family="sans-serif" font-size="9" fill="#0a6"> on this size)</text>

    <!-- arrow showing handle motion -->
    <path d="M 200 250 Q 220 220 235 200" stroke="#0a6" stroke-width="1.2" fill="none"/>
    <path d="M 230 200 L 235 200 L 233 205" stroke="#0a6" stroke-width="1.2" fill="none"/>
    <text x="208" y="262" font-family="sans-serif" font-size="9" fill="#0a6">flip handle up</text>
  </g>

  <!-- ============== Notes ============== -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="680" height="190" fill="#f8f5ee" stroke="#888" stroke-width="0.6"/>
    <text x="14" y="22" font-family="sans-serif" font-size="13" font-weight="bold" fill="#222">How it works</text>
    <text x="14" y="42" font-family="sans-serif" font-size="11" fill="#333">- 3 printed-PLA parts: BASE (mounted to neck plate via #4-40 screw in slot), ROTOR/HANDLE (pivots), V-groove cradle at the pusher tip.</text>
    <text x="14" y="58" font-family="sans-serif" font-size="11" fill="#333">- 1 metal part: slotted spring tension pin (5/64"x7/16" high-carbon steel). Press-fit through base+rotor; its springiness gives the lever firm "click" feel without a separate spring washer.</text>
    <text x="14" y="74" font-family="sans-serif" font-size="11" fill="#333">- The handle compresses the rotor against the base jaws (~13 kg compression at assembly) so friction holds the rotor in either position.</text>
    <text x="14" y="90" font-family="sans-serif" font-size="11" fill="#333">- V-groove cradles the string from the side, eliminating the lateral roll that round-groove single-contact levers suffer from.</text>
    <text x="14" y="106" font-family="sans-serif" font-size="11" fill="#333">- Operating force at handle: ~100-350 g (matches Camac, Loveland, Truitt commercial levers).</text>

    <text x="14" y="132" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a02020">Caveats for this 47-string design</text>
    <text x="14" y="148" font-family="sans-serif" font-size="11" fill="#333">- Josephus's 3 sizes (Narrow/Regular/Large) cover a typical lever harp (~26-36 strings). 47 strings span C1-G7, so likely needs 5 sizes (XL bass, L, R, N, XS treble).</text>
    <text x="14" y="164" font-family="sans-serif" font-size="11" fill="#333">- High-treble string spacing on this scale gets to ~5-7 mm (Erard tier scale); the printed Narrow base at 9 mm wide will not fit. XS variant (~6 mm base, ~3 mm handle) needed.</text>
    <text x="14" y="180" font-family="sans-serif" font-size="11" fill="#333">- Low-bass strings exceed the 2.13 mm "thickest tested" diameter Josephus quotes; XL with deeper V-groove + larger axle pin needed.</text>
  </g>
</svg>
