<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <title>Flared treble sound hole - section view</title>

  <!-- background -->
  <rect x="0" y="0" width="700" height="500" fill="#ffffff"/>

  <!-- title -->
  <text x="350" y="28" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">
    Flared treble sound hole (horn exit) - section view
  </text>
  <text x="350" y="46" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555">
    Replaces the round port at s' ~ 1475. Better radiation impedance match for treble (G6 - G7).
  </text>

  <!-- chamber wall (section, hatched) -->
  <!-- inner face on left (chamber side), outer face on right (radiating side) -->
  <!-- wall is 4 mm thick at the throat, swelling to ~12 mm at the flare boss -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#a08060" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Upper wall section (above the hole) -->
  <path d="M 100 100
           L 280 100
           L 280 180
           Q 320 195 360 200
           L 360 100
           L 600 100
           L 600 90
           L 100 90
           Z"
        fill="url(#hatch)" stroke="#6b4a2a" stroke-width="1.2"/>

  <!-- Lower wall section (below the hole), mirror -->
  <path d="M 100 400
           L 280 400
           L 280 320
           Q 320 305 360 300
           L 360 400
           L 600 400
           L 600 410
           L 100 410
           Z"
        fill="url(#hatch)" stroke="#6b4a2a" stroke-width="1.2"/>

  <!-- horn flare profile (smooth exponential / Bezier shape) -->
  <!-- throat at x=280 (Ø60 = 60 mm), mouth at x=360 (Ø100 = 100 mm) -->
  <!-- Drawn as a guide line on the upper inner face -->
  <path d="M 280 180 Q 320 195 360 200" stroke="#0a6" stroke-width="2" fill="none"/>
  <path d="M 280 320 Q 320 305 360 300" stroke="#0a6" stroke-width="2" fill="none"/>

  <!-- centerline -->
  <line x1="60" y1="250" x2="650" y2="250" stroke="#888" stroke-width="0.6" stroke-dasharray="6 4"/>
  <text x="60" y="245" font-family="sans-serif" font-size="9" fill="#666">axis</text>

  <!-- chamber side (left) label -->
  <text x="160" y="70" font-family="sans-serif" font-size="11" fill="#555">CHAMBER (interior, +n inboard)</text>
  <path d="M 160 75 L 130 75 M 135 70 L 130 75 L 135 80" stroke="#555" stroke-width="0.8" fill="none"/>

  <!-- radiating side (right) label -->
  <text x="450" y="70" font-family="sans-serif" font-size="11" fill="#555">RADIATING (outside)</text>
  <path d="M 540 75 L 580 75 M 575 70 L 580 75 L 575 80" stroke="#555" stroke-width="0.8" fill="none"/>

  <!-- THROAT diameter dim -->
  <line x1="280" y1="180" x2="280" y2="320" stroke="#222" stroke-width="0.5"/>
  <line x1="265" y1="180" x2="295" y2="180" stroke="#222" stroke-width="0.5"/>
  <line x1="265" y1="320" x2="295" y2="320" stroke="#222" stroke-width="0.5"/>
  <text x="245" y="255" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">throat</text>
  <text x="245" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#222">D = 60 mm</text>

  <!-- MOUTH diameter dim -->
  <line x1="360" y1="200" x2="360" y2="300" stroke="#222" stroke-width="0.5"/>
  <line x1="345" y1="200" x2="375" y2="200" stroke="#222" stroke-width="0.5"/>
  <line x1="345" y1="300" x2="375" y2="300" stroke="#222" stroke-width="0.5"/>
  <text x="395" y="245" font-family="sans-serif" font-size="11" font-weight="bold" fill="#222">mouth</text>
  <text x="395" y="260" font-family="sans-serif" font-size="11" fill="#222">D = 100 mm</text>

  <!-- LENGTH dim -->
  <line x1="280" y1="430" x2="360" y2="430" stroke="#222" stroke-width="0.5"/>
  <line x1="280" y1="425" x2="280" y2="435" stroke="#222" stroke-width="0.5"/>
  <line x1="360" y1="425" x2="360" y2="435" stroke="#222" stroke-width="0.5"/>
  <text x="320" y="448" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#222">flare length L = 35 mm</text>

  <!-- WALL THICKNESS dim at throat -->
  <line x1="100" y1="465" x2="280" y2="465" stroke="#222" stroke-width="0.5"/>
  <line x1="100" y1="460" x2="100" y2="470" stroke="#222" stroke-width="0.5"/>
  <line x1="280" y1="460" x2="280" y2="470" stroke="#222" stroke-width="0.5"/>
  <text x="190" y="478" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#444">throat region (chamber wall t = 4 mm)</text>

  <!-- WAVE arrows showing radiation -->
  <g stroke="#06a" stroke-width="1.2" fill="none" opacity="0.6">
    <path d="M 200 230 Q 240 230 280 225"/>
    <path d="M 200 250 Q 240 250 280 250"/>
    <path d="M 200 270 Q 240 270 280 275"/>
    <!-- after throat, fan out -->
    <path d="M 280 225 Q 320 215 380 200 Q 440 185 500 170"/>
    <path d="M 280 250 Q 320 250 380 250 Q 440 250 500 250"/>
    <path d="M 280 275 Q 320 285 380 300 Q 440 315 500 330"/>
  </g>
  <text x="160" y="218" font-family="sans-serif" font-size="9" fill="#06a">treble waves</text>
  <text x="510" y="170" font-family="sans-serif" font-size="9" fill="#06a">radiated outward</text>

  <!-- design notes -->
  <g font-family="sans-serif" font-size="10" fill="#444">
    <text x="40" y="370">Rationale:</text>
    <text x="40" y="384">  - Round port (current Ø75) reflects most treble back into chamber</text>
    <text x="40" y="396">    (impedance mismatch: small port vs large chamber).</text>
    <text x="40" y="412">  - Conical/exponential flare = short horn. Smooth taper from</text>
    <text x="40" y="424">    throat impedance to free-air impedance over ~lambda/4.</text>
    <text x="40" y="440">  - At lambda = 110 mm (G7), L = 35 mm covers ~lambda/3. Marginal</text>
    <text x="40" y="452">    but useful; mostly helps 1.5 - 6 kHz harmonics.</text>
  </g>

  <!-- profile alternatives note -->
  <g font-family="sans-serif" font-size="10" fill="#444">
    <text x="430" y="370">Profile choice:</text>
    <text x="430" y="384">  - Conical (straight): easy to mold,</text>
    <text x="430" y="396">    OK acoustics.</text>
    <text x="430" y="412">  - Exponential (drawn): better match,</text>
    <text x="430" y="424">    needs a smooth Bezier section.</text>
    <text x="430" y="440">  - Tractrix: best, harder to mold.</text>
  </g>

  <!-- Plan-view inset (top-down on the bulge wall, showing it's circular in plan) -->
  <g transform="translate(560, 360)">
    <text x="0" y="-50" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">plan view</text>
    <text x="0" y="-38" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555">(looking +n into chamber wall)</text>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#0a6" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="21" fill="none" stroke="#0a6" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="0" y="4" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#0a6">throat 60</text>
    <text x="0" y="55" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#0a6">mouth 100</text>
  </g>
</svg>
